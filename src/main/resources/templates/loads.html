<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>

    <title>Товари</title>

    <style>

        .loads-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            gap:15px;
            flex-wrap:wrap;
        }

        .filters-card{
            background:white;
            padding:20px;
            border-radius:12px;
            margin-bottom:25px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }

        .load-item{
            background:white;
            border-radius:12px;
            padding:20px;
            margin-bottom:18px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
            border-left:4px solid #0f4c75;
            transition:0.2s;
        }

        .load-item:hover{
            transform:translateY(-2px);
        }

        .load-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .load-field{
            display:flex;
            flex-direction:column;
        }

        .load-field-label{
            font-size:12px;
            color:#999;
            font-weight:bold;
            margin-bottom:5px;
            text-transform:uppercase;
        }

        .load-field-value{
            font-size:15px;
            color:#2c3e50;
            font-weight:600;
            word-break:break-word;
        }

        .load-actions{
            display:flex;
            gap:10px;
            margin-top:20px;
            flex-wrap:wrap;
        }

        .load-image{
            width:150px;
            height:120px;
            object-fit:cover;
            border-radius:10px;
            margin-top:15px;
            cursor:pointer;
            transition:0.3s;
            border:1px solid #ddd;
        }

        .load-image:hover{
            transform:scale(1.03);
        }

        .pagination-container{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:15px;
            margin-top:30px;
            flex-wrap:wrap;
        }

        .status-pending{
            background:#ffc107;
            color:#000;
        }

        .status-loading{
            background:#0d6efd;
            color:#fff;
        }

        .status-delivered{
            background:#198754;
            color:#fff;
        }

        .empty-state{
            background:white;
            padding:40px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }

        @media(max-width:768px){

            .loads-header{
                flex-direction:column;
                align-items:flex-start;
            }

            .load-grid{
                grid-template-columns:1fr;
            }

            .pagination-container{
                flex-direction:column;
            }

            .load-image{
                width:100%;
                height:220px;
            }

        }

    </style>

</head>

<body>

<div layout:fragment="content">

    <div class="loads-header">

        <div>

            <h1>

                <i class="fas fa-boxes"></i>
                Товари

            </h1>

            <p class="text-muted">

                Всички регистрирани товари

            </p>

        </div>

        <div class="d-flex gap-2 flex-wrap">

            <a sec:authorize="hasRole('ADMIN')"

               th:href="@{/loads/export/excel(

               productName=${search.productName},

               truckNumber=${search.truckNumber},

               loadedBy=${search.loadedBy},

               status=${search.status}

               )}"

               class="btn btn-dark">

                <i class="fas fa-file-excel"></i>
                Export Excel

            </a>

            <a href="/loads/create"
               class="btn btn-success">

                <i class="fas fa-plus-circle"></i>
                Добави Товар

            </a>

        </div>

    </div>

    <!-- FILTERS -->

    <div class="filters-card">

        <form method="get"
              th:action="@{/loads}">

            <div class="row g-3">

                <div class="col-md-3">

                    <input type="text"
                           name="productName"
                           class="form-control"
                           placeholder="Продукт"
                           th:value="${search.productName}">

                </div>

                <div class="col-md-2">

                    <input type="text"
                           name="truckNumber"
                           class="form-control"
                           placeholder="Камион"
                           th:value="${search.truckNumber}">

                </div>

                <div class="col-md-2">

                    <input type="text"
                           name="loadedBy"
                           class="form-control"
                           placeholder="Натоварил"
                           th:value="${search.loadedBy}">

                </div>

                <div class="col-md-2">

                    <select name="status"
                            class="form-select">

                        <option value="">
                            Всички статуси
                        </option>

                        <option th:each="status : ${statuses}"
                                th:value="${status}"
                                th:text="${status.displayName}"
                                th:selected="${search.status == status}">
                        </option>

                    </select>

                </div>

                <div class="col-md-3 d-flex gap-2">

                    <button type="submit"
                            class="btn btn-primary w-100">

                        <i class="fas fa-search"></i>
                        Търси

                    </button>

                    <a href="/loads"
                       class="btn btn-secondary w-100">

                        Изчисти

                    </a>

                </div>

            </div>

        </form>

    </div>

    <!-- EMPTY -->

    <div th:if="${#lists.isEmpty(loads)}"
         class="empty-state">

        <h4 class="mb-3">

            Няма намерени товари

        </h4>

        <p class="text-muted">

            Добави първия товар в системата.

        </p>

    </div>

    <!-- LOADS -->

    <div th:each="load : ${loads}"
         class="load-item">

        <div class="load-grid">

            <div class="load-field">

                <span class="load-field-label">
                    ID
                </span>

                <span class="load-field-value"
                      th:text="${load.id}">
                </span>

            </div>

            <div class="load-field">

                <span class="load-field-label">
                    Продукт
                </span>

                <span class="load-field-value"
                      th:text="${load.productName}">
                </span>

            </div>

            <div class="load-field">

                <span class="load-field-label">
                    Количество
                </span>

                <span class="load-field-value"
                      th:text="${load.quantity}">
                </span>

            </div>

            <div class="load-field">

                <span class="load-field-label">
                    Камион
                </span>

                <span class="load-field-value"
                      th:text="${load.truck?.truckNumber}">
                </span>

            </div>

            <div class="load-field">

                <span class="load-field-label">
                    Натоварил
                </span>

                <span class="load-field-value"
                      th:text="${load.loadedBy}">
                </span>

            </div>

            <div class="load-field">

                <span class="load-field-label">
                    Превозван от
                </span>

                <span class="load-field-value"
                      th:text="${load.transportedBy}">
                </span>

            </div>

            <div class="load-field">

                <span class="load-field-label">
                    Статус
                </span>

                <span class="badge"

                      th:classappend="

                      ${load.status.name() == 'PENDING'} ? 'status-pending' :

                      (${load.status.name() == 'LOADING'} ? 'status-loading' :

                      'status-delivered')"

                      th:text="${load.status.displayName}">
                </span>

            </div>

            <div class="load-field">

                <span class="load-field-label">
                    Добавен от
                </span>

                <span class="load-field-value"
                      th:text="${load.createdBy?.username}">
                </span>

            </div>

            <div class="load-field">

                <span class="load-field-label">
                    Дата
                </span>

                <span class="load-field-value"
                      th:text="${#temporals.format(load.loadingDate, 'dd.MM.yyyy HH:mm')}">
                </span>

            </div>

        </div>

        <!-- IMAGE -->

        <div th:if="${load.imagePath != null}">

            <img th:src="@{'/uploads/' + ${load.imagePath}}"

                 class="load-image"

                 loading="lazy"

                 onclick="window.open(this.src,'_blank')">

        </div>

        <!-- DOCUMENT -->

        <div class="mt-3"
             th:if="${load.documentPath != null}">

            <a th:href="@{'/uploads/documents/' + ${load.documentPath}}"
               target="_blank"
               class="btn btn-primary btn-sm">

                <i class="fas fa-file-pdf"></i>
                Виж Бележка

            </a>

        </div>

        <!-- ACTIONS -->

        <div class="load-actions">

            <a th:href="@{/loads/edit/{id}(id=${load.id})}"
               class="btn btn-warning btn-sm">

                <i class="fas fa-edit"></i>
                Редактирай

            </a>

            <form th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                  th:action="@{/loads/delete/{id}(id=${load.id})}"
                  method="post">

                <button type="submit"
                        class="btn btn-danger btn-sm"
                        onclick="return confirm('Сигурен ли си?')">

                    <i class="fas fa-trash"></i>
                    Изтрий

                </button>

            </form>

        </div>

    </div>

    <!-- PAGINATION -->

    <div class="pagination-container"
         th:if="${totalPages > 1}">

        <a class="btn btn-outline-primary"

           th:if="${currentPage > 0}"

           th:href="@{/loads(

           page=${currentPage - 1},

           productName=${search.productName},

           truckNumber=${search.truckNumber},

           loadedBy=${search.loadedBy},

           status=${search.status}

           )}">

            <i class="fas fa-arrow-left"></i>
            Previous

        </a>

        <span class="fw-bold">

            Страница
            <span th:text="${currentPage + 1}"></span>
            от
            <span th:text="${totalPages}"></span>

        </span>

        <a class="btn btn-outline-primary"

           th:if="${currentPage + 1 < totalPages}"

           th:href="@{/loads(

           page=${currentPage + 1},

           productName=${search.productName},

           truckNumber=${search.truckNumber},

           loadedBy=${search.loadedBy},

           status=${search.status}

           )}">

            Next
            <i class="fas fa-arrow-right"></i>

        </a>

    </div>

</div>

</body>

</html>
