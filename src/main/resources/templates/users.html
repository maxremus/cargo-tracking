<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>

    <title>
        Потребители
    </title>

    <style>

        .page-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            gap:15px;
            flex-wrap:wrap;
        }

        .users-card{
            background:white;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
        }

        .users-header{
            background:linear-gradient(135deg,#0f4c75,#16213e);
            color:white;
            padding:22px 25px;
        }

        .table{
            margin:0;
        }

        .table thead th{
            background:#f8fafc;
            color:#64748b;
            font-size:13px;
            text-transform:uppercase;
            border:none;
            padding:18px 16px;
            letter-spacing:0.5px;
        }

        .table tbody td{
            vertical-align:middle;
            padding:18px 16px;
            border-color:#f1f5f9;
        }

        .table tbody tr{
            transition:0.2s;
        }

        .table tbody tr:hover{
            background:#f8fafc;
        }

        .role-badge{
            padding:8px 14px;
            border-radius:12px;
            font-size:12px;
            font-weight:700;
            letter-spacing:0.3px;
        }

        .role-admin{
            background:#dc2626;
            color:white;
        }

        .role-worker{
            background:#0d6efd;
            color:white;
        }

        .status-badge{
            padding:8px 14px;
            border-radius:12px;
            font-size:12px;
            font-weight:700;
        }

        .status-enabled{
            background:#dcfce7;
            color:#166534;
        }

        .status-disabled{
            background:#fee2e2;
            color:#991b1b;
        }

        .user-id{
            font-weight:700;
            color:#0f4c75;
        }

        .username{
            font-weight:600;
            color:#1e293b;
        }

        .action-buttons{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .btn{
            border-radius:10px;
            font-weight:600;
        }

        .empty-state{
            padding:60px 20px;
            text-align:center;
        }

        .empty-state i{
            font-size:60px;
            color:#cbd5e1;
            margin-bottom:20px;
        }

        .empty-state h4{
            color:#555;
            margin-bottom:10px;
        }

        .empty-state p{
            color:#999;
            margin:0;
        }

        .stats-row{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:25px;
        }

        .stats-card{
            background:white;
            border-radius:18px;
            padding:25px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
        }

        .stats-title{
            color:#777;
            font-size:14px;
            margin-bottom:10px;
        }

        .stats-value{
            font-size:32px;
            font-weight:700;
            color:#0f4c75;
        }

        @media(max-width:768px){

            .page-header{
                flex-direction:column;
                align-items:flex-start;
            }

            .table-responsive{
                font-size:14px;
            }

            .action-buttons{
                flex-direction:column;
            }

            .action-buttons .btn,
            .action-buttons form{
                width:100%;
            }

        }

    </style>

</head>

<body>

<div layout:fragment="content">

    <!-- HEADER -->

    <div class="page-header">

        <div>

            <h1>

                <i class="fas fa-users"></i>
                Потребители

            </h1>

            <p class="text-muted">

                Управление на потребителите

            </p>

        </div>

        <a href="/users/create"
           class="btn btn-success">

            <i class="fas fa-plus-circle"></i>
            Добави Потребител

        </a>

    </div>

    <!-- STATS -->

    <div class="stats-row">

        <div class="stats-card">

            <div class="stats-title">

                Общо потребители

            </div>

            <div class="stats-value"
                 th:text="${#lists.size(users)}">

                0

            </div>

        </div>

        <div class="stats-card">

            <div class="stats-title">

                Администратори

            </div>

            <div class="stats-value"
                 th:text="${users.?[role.name() == 'ADMIN'].size()}">

                0

            </div>

        </div>

        <div class="stats-card">

            <div class="stats-title">

                Работници

            </div>

            <div class="stats-value"
                 th:text="${users.?[role.name() == 'WORKER'].size()}">

                0

            </div>

        </div>

    </div>

    <!-- USERS TABLE -->

    <div class="users-card">

        <div class="users-header">

            <h4 class="mb-1">

                <i class="fas fa-user-shield"></i>
                Списък с потребители

            </h4>

            <small>

                Всички регистрирани потребители

            </small>

        </div>

        <!-- EMPTY -->

        <div th:if="${#lists.isEmpty(users)}"
             class="empty-state">

            <i class="fas fa-users-slash"></i>

            <h4>

                Няма потребители

            </h4>

            <p>

                Добави първия потребител в системата.

            </p>

        </div>

        <!-- TABLE -->

        <div class="table-responsive"
             th:if="${!#lists.isEmpty(users)}">

            <table class="table table-hover align-middle">

                <thead>

                <tr>

                    <th>ID</th>

                    <th>Потребител</th>

                    <th>Роля</th>

                    <th>Статус</th>

                    <th class="text-end">
                        Действия
                    </th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="u : ${users}">

                    <!-- ID -->

                    <td>

                        <span class="user-id"
                              th:text="'#' + ${u.id}">
                        </span>

                    </td>

                    <!-- USERNAME -->

                    <td>

                        <div class="username"
                             th:text="${u.username}">
                        </div>

                    </td>

                    <!-- ROLE -->

                    <td>

                        <span class="role-badge"

                              th:classappend="${u.role.name() == 'ADMIN'} ?

                              'role-admin' : 'role-worker'"

                              th:text="${u.role}">
                        </span>

                    </td>

                    <!-- STATUS -->

                    <td>

                        <span class="status-badge"

                              th:classappend="${u.enabled} ?

                              'status-enabled' : 'status-disabled'">

                            <span th:text="${u.enabled ? 'Активен' : 'Изключен'}">
                            </span>

                        </span>

                    </td>

                    <!-- ACTIONS -->

                    <td class="text-end">

                        <div class="action-buttons justify-content-end">

                            <a th:href="@{/users/edit/{id}(id=${u.id})}"
                               class="btn btn-warning btn-sm">

                                <i class="fas fa-edit"></i>
                                Редактирай

                            </a>

                            <form th:action="@{/users/delete/{id}(id=${u.id})}"
                                  method="post"
                                  onsubmit="return confirm('Сигурен ли си?')">

                                <button type="submit"
                                        class="btn btn-danger btn-sm">

                                    <i class="fas fa-trash"></i>
                                    Изтрий

                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
