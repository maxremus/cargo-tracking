<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>

    <title>
        Камиони
    </title>

    <style>

        .page-header{
            margin-bottom:30px;
        }

        .content-wrapper{
            display:grid;
            grid-template-columns:350px 1fr;
            gap:25px;
            align-items:start;
        }

        .form-section{
            background:white;
            border-radius:18px;
            padding:25px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
            position:sticky;
            top:20px;
        }

        .form-section h4{
            margin-bottom:25px;
            color:#0f4c75;
            font-weight:700;
        }

        .form-control,
        .form-select{
            border-radius:10px;
            min-height:45px;
        }

        .form-control:focus{
            border-color:#0f4c75;
            box-shadow:0 0 0 4px rgba(15,76,117,0.10);
        }

        .trucks-list-section{
            background:white;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
        }

        .trucks-header{
            background:linear-gradient(135deg,#0f4c75,#16213e);
            color:white;
            padding:20px 25px;
        }

        .truck-card{
            border-bottom:1px solid #f1f1f1;
            padding:22px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:20px;
            transition:0.2s;
        }

        .truck-card:last-child{
            border-bottom:none;
        }

        .truck-card:hover{
            background:#f8fafc;
        }

        .truck-info{
            flex:1;
        }

        .truck-number{
            font-size:22px;
            font-weight:700;
            color:#0f4c75;
            margin-bottom:12px;
        }

        .truck-details{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:10px;
        }

        .truck-detail{
            color:#555;
            font-size:14px;
        }

        .truck-detail strong{
            color:#2c3e50;
        }

        .truck-actions{
            display:flex;
            flex-direction:column;
            gap:10px;
            min-width:140px;
        }

        .btn{
            border-radius:10px;
            font-weight:600;
        }

        .empty-state{
            padding:50px 20px;
            text-align:center;
        }

        .empty-state i{
            font-size:50px;
            color:#cbd5e1;
            margin-bottom:15px;
        }

        .empty-state h4{
            color:#555;
            margin-bottom:10px;
        }

        .empty-state p{
            color:#999;
            margin:0;
        }

        .stats-row{
            display:flex;
            gap:15px;
            margin-top:20px;
        }

        .stats-card{
            flex:1;
            background:#f8fafc;
            border-radius:12px;
            padding:15px;
            text-align:center;
        }

        .stats-value{
            font-size:24px;
            font-weight:700;
            color:#0f4c75;
        }

        .stats-label{
            font-size:13px;
            color:#777;
        }

        @media(max-width:992px){

            .content-wrapper{
                grid-template-columns:1fr;
            }

            .form-section{
                position:static;
            }

        }

        @media(max-width:768px){

            .truck-card{
                flex-direction:column;
                align-items:flex-start;
            }

            .truck-actions{
                width:100%;
                flex-direction:row;
            }

            .truck-actions .btn{
                flex:1;
            }

            .truck-details{
                grid-template-columns:1fr;
            }

        }

    </style>

</head>

<body>

<div layout:fragment="content">

    <!-- HEADER -->

    <div class="page-header">

        <h1>

            <i class="fas fa-truck"></i>
            Камиони

        </h1>

        <p class="text-muted">

            Управление на камионите

        </p>

    </div>

    <div class="content-wrapper">

        <!-- FORM -->

        <div>

            <div class="form-section">

                <h4 th:if="${truck.id == null}">

                    <i class="fas fa-plus-circle"></i>
                    Добави Камион

                </h4>

                <h4 th:if="${truck.id != null}">

                    <i class="fas fa-edit"></i>
                    Редактирай Камион

                </h4>

                <form th:action="@{/trucks/save}"
                      method="post"
                      th:object="${truck}">

                    <input type="hidden"
                           th:field="*{id}">

                    <!-- NUMBER -->

                    <div class="mb-3">

                        <label class="form-label">

                            Номер

                        </label>

                        <input type="text"
                               th:field="*{truckNumber}"
                               class="form-control"
                               maxlength="30"
                               required>

                    </div>

                    <!-- DRIVER -->

                    <div class="mb-3">

                        <label class="form-label">

                            Шофьор

                        </label>

                        <input type="text"
                               th:field="*{driverName}"
                               class="form-control"
                               maxlength="100">

                    </div>

                    <!-- MODEL -->

                    <div class="mb-3">

                        <label class="form-label">

                            Модел

                        </label>

                        <input type="text"
                               th:field="*{model}"
                               class="form-control"
                               maxlength="100">

                    </div>

                    <!-- COMPANY -->

                    <div class="mb-4">

                        <label class="form-label">

                            Компания

                        </label>

                        <input type="text"
                               th:field="*{companyName}"
                               class="form-control"
                               maxlength="100">

                    </div>

                    <button type="submit"
                            class="btn btn-success w-100">

                        <i class="fas fa-save"></i>

                        <span th:if="${truck.id == null}">
                            Запази
                        </span>

                        <span th:if="${truck.id != null}">
                            Обнови
                        </span>

                    </button>

                </form>

                <!-- STATS -->

                <div class="stats-row">

                    <div class="stats-card">

                        <div class="stats-value"
                             th:text="${#lists.size(trucks)}">

                            0

                        </div>

                        <div class="stats-label">

                            Камиони

                        </div>

                    </div>

                    <div class="stats-card">

                        <div class="stats-value"
                             th:text="${totalLoads ?: 0}">

                            0

                        </div>

                        <div class="stats-label">

                            Товари

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- LIST -->

        <div>

            <div class="trucks-list-section">

                <div class="trucks-header">

                    <h4 class="mb-1">

                        <i class="fas fa-list"></i>
                        Списък с камиони

                    </h4>

                    <small>

                        Всички регистрирани камиони

                    </small>

                </div>

                <!-- EMPTY -->

                <div th:if="${#lists.isEmpty(trucks)}"
                     class="empty-state">

                    <i class="fas fa-truck-moving"></i>

                    <h4>

                        Няма добавени камиони

                    </h4>

                    <p>

                        Добави първия камион в системата.

                    </p>

                </div>

                <!-- TRUCKS -->

                <div th:each="t : ${trucks}"
                     class="truck-card">

                    <div class="truck-info">

                        <div class="truck-number"
                             th:text="${t.truckNumber}">
                        </div>

                        <div class="truck-details">

                            <div class="truck-detail">

                                <strong>
                                    Шофьор:
                                </strong>

                                <span th:text="${t.driverName ?: 'Няма'}">
                                </span>

                            </div>

                            <div class="truck-detail">

                                <strong>
                                    Модел:
                                </strong>

                                <span th:text="${t.model ?: 'Няма'}">
                                </span>

                            </div>

                            <div class="truck-detail">

                                <strong>
                                    Компания:
                                </strong>

                                <span th:text="${t.companyName ?: 'Няма'}">
                                </span>

                            </div>

                        </div>

                    </div>

                    <!-- ACTIONS -->

                    <div class="truck-actions">

                        <a th:href="@{/trucks/edit/{id}(id=${t.id})}"
                           class="btn btn-warning btn-sm">

                            <i class="fas fa-edit"></i>
                            Редактирай

                        </a>

                        <form sec:authorize="hasRole('ADMIN')"
                              th:action="@{/trucks/delete/{id}(id=${t.id})}"
                              method="post">

                            <button type="submit"
                                    class="btn btn-danger btn-sm w-100"
                                    onclick="return confirm('Сигурен ли си?')">

                                <i class="fas fa-trash"></i>
                                Изтрий

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
