<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        CargoTrack
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                    linear-gradient(
                            135deg,
                            #0f3460 0%,
                            #16213e 50%,
                            #0f4c75 100%
                    );

            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

            overflow:hidden;
            position:relative;
        }

        .bg-circle{

            position:absolute;

            border-radius:50%;

            background:
                    rgba(255,255,255,0.05);

            filter:blur(10px);
        }

        .circle1{

            width:300px;
            height:300px;

            top:-100px;
            left:-100px;
        }

        .circle2{

            width:400px;
            height:400px;

            bottom:-150px;
            right:-150px;
        }

        .welcome-card{

            position:relative;
            z-index:2;

            width:100%;
            max-width:560px;

            padding:55px 45px;

            border-radius:28px;

            background:
                    rgba(255,255,255,0.08);

            backdrop-filter:blur(14px);

            border:
                    1px solid rgba(255,255,255,0.12);

            box-shadow:
                    0 20px 60px rgba(0,0,0,0.35);

            text-align:center;

            transition:0.4s;
        }

        .welcome-card:hover{

            transform:translateY(-5px);

            box-shadow:
                    0 30px 80px rgba(0,0,0,0.45);
        }

        .logo-wrapper{

            display:flex;
            justify-content:center;
            align-items:center;

            margin-bottom:30px;
        }

        .logo-box{

            width:220px;
            height:220px;

            border-radius:30px;

            background:
                    rgba(255,255,255,0.08);

            border:
                    1px solid rgba(255,255,255,0.1);

            display:flex;
            justify-content:center;
            align-items:center;

            color:white;

            font-size:85px;

            box-shadow:
                    0 10px 30px rgba(0,0,0,0.25);

            transition:0.35s;
        }

        .logo-box:hover{

            transform:
                    scale(1.05)
                    rotate(-2deg);
        }

        .title{

            color:white;

            font-size:42px;
            font-weight:700;

            margin-bottom:12px;

            letter-spacing:2px;
        }

        .subtitle{

            color:
                    rgba(255,255,255,0.82);

            font-size:17px;

            margin-bottom:40px;

            line-height:1.6;
        }

        .btn-wrapper{

            display:flex;
            justify-content:center;
            gap:18px;
            flex-wrap:wrap;
        }

        .enter-btn{

            border:none;

            padding:14px 32px;

            border-radius:14px;

            font-size:16px;
            font-weight:600;

            transition:0.3s;

            text-decoration:none;

            display:inline-flex;
            align-items:center;
            gap:10px;
        }

        .login-btn{

            background:white;
            color:#0f3460;
        }

        .login-btn:hover{

            background:#edf4fb;

            transform:translateY(-2px);

            color:#0f3460;
        }

        .register-btn{

            background:#20c997;
            color:white;
        }

        .register-btn:hover{

            background:#18b48a;

            transform:translateY(-2px);

            color:white;
        }

        .footer-text{

            margin-top:40px;

            color:
                    rgba(255,255,255,0.55);

            font-size:14px;
        }

        @media(max-width:768px){

            .welcome-card{

                margin:20px;

                padding:40px 25px;
            }

            .title{
                font-size:34px;
            }

            .logo-box{

                width:180px;
                height:180px;

                font-size:70px;
            }

            .btn-wrapper{

                flex-direction:column;
            }

            .enter-btn{

                width:100%;
                justify-content:center;
            }
        }

    </style>

</head>

<body>

<div class="bg-circle circle1"></div>

<div class="bg-circle circle2"></div>

<div class="welcome-card">

    <div class="logo-wrapper">

        <div class="logo-box">

            <i class="fas fa-truck-fast"></i>

        </div>

    </div>

    <h1 class="title">

        CargoTrack

    </h1>

    <p class="subtitle">

        SaaS система за управление,
        проследяване и анализ на товари,
        доставки и транспортни процеси.

    </p>

    <div class="btn-wrapper">

        <a href="/login"
           class="enter-btn login-btn">

            <i class="fas fa-right-to-bracket"></i>

            Вход

        </a>

        <a href="/register-company"
           class="enter-btn register-btn">

            <i class="fas fa-building"></i>

            Регистрация на фирма

        </a>

    </div>

    <div class="footer-text">

        © 2026 CargoTrack

    </div>

</div>

</body>

</html>
