<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        UBM Group
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
                    linear-gradient(
                            135deg,
                            #0f3460 0%,
                            #16213e 50%,
                            #0f4c75 100%
                    );

            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

            overflow:hidden;
            position:relative;
        }

        .bg-circle{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.05);
            filter:blur(10px);
        }

        .circle1{
            width:300px;
            height:300px;
            top:-100px;
            left:-100px;
        }

        .circle2{
            width:400px;
            height:400px;
            bottom:-150px;
            right:-150px;
        }

        .welcome-card{

            position:relative;
            z-index:2;

            width:100%;
            max-width:520px;

            padding:50px 40px;

            border-radius:24px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(14px);

            border:1px solid rgba(255,255,255,0.12);

            box-shadow:
                    0 20px 60px rgba(0,0,0,0.35);

            text-align:center;

            transition:0.4s;
        }

        .welcome-card:hover{

            transform:translateY(-5px);

            box-shadow:
                    0 30px 80px rgba(0,0,0,0.45);
        }

        .logo-wrapper{

            display:flex;
            justify-content:center;
            align-items:center;

            margin-bottom:30px;
        }

        .logo-btn{

            border:none;
            background:none;

            transition:0.35s;
        }

        .logo-btn:hover{

            transform:
                    scale(1.08)
                    rotate(-2deg);
        }

        .logo-btn img{

            width:230px;
            border-radius:20px;

            box-shadow:
                    0 10px 30px rgba(0,0,0,0.3);
        }

        .title{

            color:white;

            font-size:38px;
            font-weight:700;

            margin-bottom:10px;

            letter-spacing:2px;
        }

        .subtitle{

            color:rgba(255,255,255,0.8);

            font-size:17px;

            margin-bottom:35px;
        }

        .enter-btn{

            background:white;
            color:#0f3460;

            border:none;

            padding:14px 40px;

            border-radius:12px;

            font-size:16px;
            font-weight:600;

            transition:0.3s;

            text-decoration:none;

            display:inline-flex;
            align-items:center;
            gap:10px;
        }

        .enter-btn:hover{

            background:#e8f1f8;

            transform:translateY(-2px);

            color:#0f3460;
        }

        .footer-text{

            margin-top:35px;

            color:rgba(255,255,255,0.55);

            font-size:14px;
        }

        @media(max-width:768px){

            .welcome-card{

                margin:20px;

                padding:40px 25px;
            }

            .title{
                font-size:30px;
            }

            .logo-btn img{
                width:180px;
            }
        }

    </style>

</head>

<body>

<div class="bg-circle circle1"></div>

<div class="bg-circle circle2"></div>

<div class="welcome-card">

    <div class="logo-wrapper">

        <a href="/login"
           class="logo-btn">

            <img src="/images/ubm-logo.jpg"
                 alt="UBM Logo">

        </a>

    </div>

    <h1 class="title">
        UBM GROUP
    </h1>

    <p class="subtitle">
        Система за управление и проследяване
    </p>

    <a href="/login"
       class="enter-btn">

        <i class="fas fa-right-to-bracket"></i>

        Вход в системата

    </a>

    <div class="footer-text">

        © 2026 UBM Group

    </div>

</div>

</body>
</html>
