<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title th:text="${title} ?: 'Cargo Tracking'">
        Cargo Tracking
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            min-height:100vh;
            background:linear-gradient(135deg,#e8f4f8 0%,#ecf0f1 100%);
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            overflow-x:hidden;
        }

        body.sidebar-open{
            overflow:hidden;
        }

        .sidebar{
            width:320px;
            background:linear-gradient(180deg,#0f3460 0%,#16213e 50%,#0f4c75 100%);
            color:white;
            position:fixed;
            left:0;
            top:0;
            height:100vh;
            overflow-y:auto;
            box-shadow:0 8px 24px rgba(15,52,96,0.3);
            z-index:1000;
            display:flex;
            flex-direction:column;
            padding:25px 0;
            transition:0.3s;
        }

        .sidebar::-webkit-scrollbar{
            width:6px;
        }

        .sidebar::-webkit-scrollbar-thumb{
            background:rgba(255,255,255,0.2);
            border-radius:10px;
        }

        .brand{
            padding:0 20px 25px;
            border-bottom:1px solid rgba(255,255,255,0.15);
            margin-bottom:15px;
        }

        .brand h2{
            font-size:24px;
            font-weight:700;
            display:flex;
            align-items:center;
            gap:10px;
            margin:0;
        }

        .nav-menu{
            list-style:none;
            padding-left:0;
        }

        .nav-item{
            margin:8px 0;
            padding:0 15px;
        }

        .nav-link{
            display:flex;
            align-items:center;
            gap:12px;
            color:rgba(255,255,255,0.85);
            padding:13px 15px;
            text-decoration:none;
            border-radius:10px;
            transition:0.25s;
            font-size:15px;
            font-weight:500;
        }

        .nav-link:hover{
            background:rgba(255,255,255,0.12);
            color:white;
            transform:translateX(5px);
        }

        .nav-link.active{
            background:rgba(255,255,255,0.18);
            color:white;
            border-left:4px solid white;
        }

        .nav-link i{
            width:20px;
            text-align:center;
            font-size:16px;
        }

        .main-content{
            margin-left:320px;
            flex:1;
            padding:40px;
            width:100%;
        }

        .card{
            border:none;
            border-radius:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }

        .stats-container{
            display:flex;
            margin-bottom:20px;
            gap:35px;
            flex-wrap:wrap;
        }

        .card-header{
            background:#f8f9fa;
            padding:15px 20px;
            border-bottom:1px solid #e9ecef;
        }

        .sidebar-footer{
            margin-top:auto;
            padding:15px;
            border-top:1px solid rgba(255,255,255,0.15);
        }

        .mobile-toggle{
            display:none;
            position:fixed;
            top:15px;
            left:15px;
            z-index:1201;
        }

        .mobile-toggle button{
            border-radius:10px;
            width:48px;
            height:48px;
            box-shadow:0 4px 10px rgba(0,0,0,0.15);
        }

        .sidebar-overlay{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.45);
            z-index:999;
            opacity:0;
            visibility:hidden;
            transition:0.3s;
        }

        .sidebar-overlay.active{
            opacity:1;
            visibility:visible;
        }

        @media(max-width:992px){

            .sidebar{
                left:-320px;
            }

            .sidebar.active{
                left:0;
            }

            .mobile-toggle{
                display:block;
            }

            .main-content{
                margin-left:0;
                padding:80px 20px 20px;
            }

        }

        @media(max-width:576px){

            .sidebar{
                width:280px;
            }

            .main-content{
                padding:80px 15px 15px;
            }

        }

    </style>

</head>

<body>

<div class="sidebar-overlay"></div>

<div class="sidebar">

    <div class="brand">

        <h2>

            <i class="fas fa-truck"></i>

            CargoTrack

        </h2>

    </div>

    <ul class="nav-menu">

        <li class="nav-item">

            <a href="/dashboard"
               class="nav-link"
               th:classappend="${currentPath == '/dashboard'} ? 'active'">

                <i class="fas fa-home"></i>

                <span>Dashboard</span>

            </a>

        </li>

        <li class="nav-item">

            <a href="/loads"
               class="nav-link"
               th:classappend="${currentPath != null and currentPath.startsWith('/loads')} ? 'active'">

                <i class="fas fa-boxes"></i>

                <span>Товари</span>

            </a>

        </li>

        <li class="nav-item">

            <a href="/trucks"
               class="nav-link"
               th:classappend="${currentPath != null and currentPath.startsWith('/trucks')} ? 'active'">

                <i class="fas fa-truck"></i>

                <span>Камиони</span>

            </a>

        </li>

        <li class="nav-item"
            sec:authorize="hasRole('ADMIN')">

            <a href="/users"
               class="nav-link"
               th:classappend="${currentPath != null and currentPath.startsWith('/users')} ? 'active'">

                <i class="fas fa-users"></i>

                <span>Потребители</span>

            </a>

        </li>

        <li class="nav-item"
            sec:authorize="hasRole('ADMIN')">

            <a href="/admin/reports"
               class="nav-link"
               th:classappend="${currentPath != null and currentPath.startsWith('/admin')} ? 'active'">

                <i class="fas fa-chart-bar"></i>

                <span>Справки</span>

            </a>

        </li>

    </ul>

    <div class="px-3 mt-3"
         th:if="${totalLoads != null || totalTrucks != null}">

        <div class="card"
             style="background:rgba(255,255,255,0.08);
             border:none;
             color:white;">

            <div class="card-body">

                <h6 class="mb-3">
                    Статистика
                </h6>

                <div class="mb-3">

                    <small>Товари</small>

                    <h4 th:text="${totalLoads ?: 0}">
                        0
                    </h4>

                </div>

                <div>

                    <small>Камиони</small>

                    <h4 th:text="${totalTrucks ?: 0}">
                        0
                    </h4>

                </div>

            </div>

        </div>

    </div>

    <div class="sidebar-footer">

        <div class="mb-3 text-white-50">

            <i class="fas fa-user"></i>

            <span sec:authentication="name"></span>

        </div>

        <form th:action="@{/logout}" method="post">

            <button type="submit"
                    class="nav-link border-0 bg-transparent w-100 text-start">

                <i class="fas fa-sign-out-alt"></i>

                <span>Изход</span>

            </button>

        </form>

    </div>

</div>

<div class="mobile-toggle">

    <button id="sidebar-toggle"
            class="btn btn-primary">

        <i class="fas fa-bars"></i>

    </button>

</div>

<div class="main-content"
     layout:fragment="content">

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

    $(document).ready(function(){

        $('#sidebar-toggle').on('click',function(){

            $('.sidebar').toggleClass('active');

            $('.sidebar-overlay').toggleClass('active');

            $('body').toggleClass('sidebar-open');

        });

        $('.sidebar-overlay').on('click',function(){

            $('.sidebar').removeClass('active');

            $('.sidebar-overlay').removeClass('active');

            $('body').removeClass('sidebar-open');

        });

    });

</script>

</body>

</html>
