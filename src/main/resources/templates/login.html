<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        Вход - CargoTrack
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:
                    linear-gradient(
                            135deg,
                            #0f3460 0%,
                            #16213e 50%,
                            #0f4c75 100%
                    );
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            overflow:hidden;
            position:relative;
        }

        body::before{
            content:'';
            position:absolute;
            width:500px;
            height:500px;
            background:rgba(255,255,255,0.05);
            border-radius:50%;
            top:-200px;
            right:-150px;
        }

        body::after{
            content:'';
            position:absolute;
            width:400px;
            height:400px;
            background:rgba(255,255,255,0.04);
            border-radius:50%;
            bottom:-180px;
            left:-120px;
        }

        .login-container{
            width:100%;
            max-width:420px;
            padding:20px;
            position:relative;
            z-index:2;
        }

        .login-card{
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 15px 45px rgba(0,0,0,0.25);
            animation:fadeUp 0.6s ease;
        }

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .login-header{
            background:
                    linear-gradient(
                            135deg,
                            #0f4c75 0%,
                            #16213e 100%
                    );
            color:white;
            text-align:center;
            padding:40px 25px;
        }

        .login-header i{
            font-size:42px;
            margin-bottom:15px;
        }

        .login-header h1{
            font-size:32px;
            font-weight:700;
            margin-bottom:8px;
        }

        .login-header p{
            opacity:0.85;
            font-size:14px;
            margin:0;
        }

        .login-body{
            padding:35px 30px;
        }

        .form-group{
            margin-bottom:22px;
        }

        .form-label{
            font-weight:600;
            margin-bottom:8px;
            color:#2c3e50;
            display:block;
        }

        .input-group{
            position:relative;
        }

        .form-control{
            height:52px;
            border-radius:12px;
            border:1px solid #dfe6e9;
            background:#f8f9fa;
            padding-left:45px;
            font-size:14px;
            transition:0.3s;
        }

        .form-control:focus{
            background:white;
            border-color:#0f4c75;
            box-shadow:0 0 0 4px rgba(15,76,117,0.10);
        }

        .input-icon{
            position:absolute;
            top:50%;
            left:15px;
            transform:translateY(-50%);
            color:#7f8c8d;
            z-index:10;
        }

        .password-toggle{
            position:absolute;
            top:50%;
            right:15px;
            transform:translateY(-50%);
            border:none;
            background:none;
            color:#7f8c8d;
            cursor:pointer;
            z-index:10;
        }

        .login-btn{
            width:100%;
            height:52px;
            border:none;
            border-radius:12px;
            background:
                    linear-gradient(
                            135deg,
                            #27ae60 0%,
                            #1e8449 100%
                    );
            color:white;
            font-weight:700;
            font-size:15px;
            transition:0.3s;
            margin-top:10px;
        }

        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(39,174,96,0.35);
        }

        .login-btn:active{
            transform:translateY(0);
        }

        .alert-custom{
            border-radius:12px;
            padding:14px;
            margin-bottom:20px;
            font-size:14px;
            display:flex;
            align-items:center;
            gap:10px;
        }

        .alert-error{
            background:#fee2e2;
            color:#991b1b;
        }

        .alert-success{
            background:#dcfce7;
            color:#166534;
        }

        .form-check{
            margin-top:-5px;
            margin-bottom:20px;
        }

        .form-check-label{
            font-size:14px;
            color:#555;
        }

        .login-footer{
            text-align:center;
            padding:20px;
            background:#f8f9fa;
            border-top:1px solid #eee;
            color:#7f8c8d;
            font-size:12px;
        }

        .loading-spinner{
            display:none;
        }

        .btn-loading .btn-text{
            display:none;
        }

        .btn-loading .loading-spinner{
            display:inline-block;
        }

        @media(max-width:480px){

            .login-header{
                padding:30px 20px;
            }

            .login-header h1{
                font-size:26px;
            }

            .login-body{
                padding:30px 20px;
            }

        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <!-- HEADER -->

        <div class="login-header">

            <i class="fas fa-truck-moving"></i>

            <h1>
                CargoTrack
            </h1>

            <p>
                Система за управление на товари
            </p>

        </div>

        <!-- BODY -->

        <div class="login-body">

            <!-- ERROR -->

            <div th:if="${param.error}"
                 class="alert-custom alert-error">

                <i class="fas fa-circle-exclamation"></i>

                <span>
                    Невалидно потребителско име или парола
                </span>

            </div>

            <!-- LOGOUT -->

            <div th:if="${param.logout}"
                 class="alert-custom alert-success">

                <i class="fas fa-check-circle"></i>

                <span>
                    Излязохте успешно от системата
                </span>

            </div>

            <!-- LOGIN FORM -->

            <form th:action="@{/login}"
                  method="post"
                  id="loginForm">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <!-- USERNAME -->

                <div class="form-group">

                    <label class="form-label">

                        Потребителско име

                    </label>

                    <div class="input-group">

                        <i class="fas fa-user input-icon"></i>

                        <input type="text"
                               name="username"
                               class="form-control"
                               placeholder="Въведи потребителско име"
                               required
                               autofocus>

                    </div>

                </div>

                <!-- PASSWORD -->

                <div class="form-group">

                    <label class="form-label">

                        Парола

                    </label>

                    <div class="input-group">

                        <i class="fas fa-lock input-icon"></i>

                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="Въведи парола"
                               required>

                        <button type="button"
                                class="password-toggle"
                                onclick="togglePassword()">

                            <i id="toggleIcon"
                               class="fas fa-eye"></i>

                        </button>

                    </div>

                </div>

                <!-- REMEMBER -->

                <div class="form-check">

                    <input type="checkbox"
                           class="form-check-input"
                           id="remember-me"
                           name="remember-me">

                    <label class="form-check-label"
                           for="remember-me">

                        Запомни ме

                    </label>

                </div>

                <!-- BUTTON -->

                <button type="submit"
                        class="login-btn"
                        id="loginBtn">

                    <span class="btn-text">

                        <i class="fas fa-sign-in-alt"></i>
                        Вход

                    </span>

                    <span class="loading-spinner">

                        <i class="fas fa-spinner fa-spin"></i>
                        Влизане...

                    </span>

                </button>

            </form>

        </div>

        <!-- FOOTER -->

        <div class="login-footer">

            <i class="fas fa-shield-halved"></i>

            Защитена система за управление на транспорт

        </div>

    </div>

</div>

<script>

    function togglePassword(){

        const password =
            document.getElementById('password');

        const icon =
            document.getElementById('toggleIcon');

        if(password.type === 'password'){

            password.type = 'text';

            icon.classList.remove('fa-eye');

            icon.classList.add('fa-eye-slash');

        }else{

            password.type = 'password';

            icon.classList.remove('fa-eye-slash');

            icon.classList.add('fa-eye');

        }

    }

    document
        .getElementById('loginForm')
        .addEventListener('submit',function(){

            document
                .getElementById('loginBtn')
                .classList.add('btn-loading');

        });

</script>

</body>

</html>
