<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>

    <title>Добави Потребител</title>

    <style>

        .form-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-card h1 {
            color: #0f4c75;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .error-text {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }

        .is-invalid {
            border: 1px solid #dc3545 !important;
        }

        @media(max-width:768px){

            .form-card{
                padding:20px;
            }

            .form-actions{
                flex-direction:column;
            }

        }

    </style>

</head>

<body>

<div layout:fragment="content">

    <div class="form-card">

        <h1>
            <i class="fas fa-user-plus"></i>
            Добави Потребител
        </h1>

        <form th:action="@{/users/save}"
              method="post"
              th:object="${user}">

            <!-- USERNAME -->

            <div class="form-group">

                <label class="form-label">
                    Username
                </label>

                <input type="text"

                       th:field="*{username}"

                       class="form-control"

                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"

                       maxlength="50"

                       required>

                <div class="error-text"
                     th:if="${#fields.hasErrors('username')}"
                     th:errors="*{username}">
                </div>

            </div>

            <!-- PASSWORD -->

            <div class="form-group">

                <label class="form-label">
                    Password
                </label>

                <input type="password"

                       th:field="*{password}"

                       class="form-control"

                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"

                       minlength="6"

                       maxlength="100"

                       required>

                <div class="error-text"
                     th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}">
                </div>

                <small class="text-muted">

                    Минимум 6 символа

                </small>

            </div>

            <!-- ROLE -->

            <div class="form-group">

                <label class="form-label">
                    Role
                </label>

                <select th:field="*{role}"

                        class="form-select"

                        th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'"

                        required>

                    <option value="">
                        -- Избери Роля --
                    </option>

                    <option th:each="role : ${roles}"
                            th:value="${role}"
                            th:text="${role}">
                    </option>

                </select>

                <div class="error-text"
                     th:if="${#fields.hasErrors('role')}"
                     th:errors="*{role}">
                </div>

            </div>

            <div class="form-check mb-3">

                <input type="checkbox"
                       th:field="*{enabled}"
                       class="form-check-input"
                       id="enabled">

                <label class="form-check-label"
                       for="enabled">

                    Активен потребител

                </label>

            </div>

            <!-- ACTIONS -->

            <div class="form-actions">

                <button type="submit"
                        class="btn btn-success"
                        onclick="this.disabled=true;this.form.submit();">

                    <i class="fas fa-save"></i>
                    Запази

                </button>

                <a href="/users"
                   class="btn btn-secondary">

                    Назад

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
