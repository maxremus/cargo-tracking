<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">

<head>

    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        .dashboard-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            flex-wrap:wrap;
            gap:15px;
        }

        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .stat-card{
            background:white;
            border-radius:18px;
            padding:25px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
            transition:0.2s;
        }

        .stat-card:hover{
            transform:translateY(-3px);
        }

        .stat-title{
            font-size:14px;
            color:#777;
            margin-bottom:10px;
        }

        .stat-value{
            font-size:34px;
            font-weight:700;
            color:#0f4c75;
        }

        .chart-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
            margin-top:30px;
        }

        .chart-card{
            background:white;
            border-radius:18px;
            padding:25px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
        }

        .chart-wrapper{
            position:relative;
            height:350px;
        }

        .quick-actions{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            margin-bottom:25px;
        }

        .info-text{
            color:#777;
            font-size:14px;
        }

        .btn{
            border-radius:12px;
            font-weight:600;
        }

        @media(max-width:992px){

            .chart-grid{
                grid-template-columns:1fr;
            }

        }

        @media(max-width:768px){

            .chart-wrapper{
                height:250px;
            }

            .stat-value{
                font-size:28px;
            }

        }

    </style>

</head>

<body>

<div layout:fragment="content">

    <!-- HEADER -->

    <div class="dashboard-header">

        <div style="width:100%;">

            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">

                <h1 class="mb-0">

                    <i class="fas fa-chart-line"></i>
                    Dashboard

                </h1>

                <div class="d-flex gap-2 flex-wrap">

                    <!-- SETTINGS -->

                    <a sec:authorize="hasRole('ADMIN')"
                       href="/admin/settings"
                       class="btn btn-primary">

                        <i class="fas fa-cog"></i>
                        Настройки

                    </a>

                    <!-- LOGS -->

                    <a sec:authorize="hasRole('ADMIN')"
                       href="/admin/logs"
                       class="btn btn-dark">

                        <i class="fas fa-clipboard-list"></i>
                        Системни Логове

                    </a>

                    <!-- REPORTS -->

                    <a sec:authorize="hasRole('ADMIN')"
                       href="/admin/reports"
                       class="btn btn-success">

                        <i class="fas fa-chart-bar"></i>
                        Reports

                    </a>

                </div>

            </div>

            <div class="info-text">

                Обща информация за системата

            </div>

        </div>

    </div>

    <!-- STATS -->

    <div class="stats-grid">

        <div class="stat-card">

            <div class="stat-title">

                Всички товари

            </div>

            <div class="stat-value"
                 th:text="${totalLoads}">

                0

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">

                Камиони

            </div>

            <div class="stat-value"
                 th:text="${totalTrucks}">

                0

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">

                Потребители

            </div>

            <div class="stat-value"
                 th:text="${totalUsers}">

                0

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">

                Чакащи товари

            </div>

            <div class="stat-value"
                 th:text="${pendingLoads}">

                0

            </div>

        </div>

    </div>

    <!-- QUICK ACTIONS -->

    <div class="quick-actions">

        <a href="/loads/create"
           class="btn btn-success">

            <i class="fas fa-plus-circle"></i>
            Нов Товар

        </a>

        <a href="/incoming-loads/create"
           class="btn btn-warning">

            <i class="fas fa-file-invoice"></i>
            Входящ Товар

        </a>

        <a href="/loads"
           class="btn btn-primary">

            <i class="fas fa-boxes"></i>
            Товари

        </a>

        <a href="/trucks"
           class="btn btn-dark">

            <i class="fas fa-truck"></i>
            Камиони

        </a>

    </div>

    <!-- CHARTS -->

    <div class="chart-grid">

        <!-- LOAD STATUS -->

        <div class="chart-card">

            <h3 class="mb-4">

                <i class="fas fa-chart-bar"></i>
                Статус на товарите

            </h3>

            <div class="chart-wrapper">

                <canvas id="statusChart"></canvas>

            </div>

        </div>

        <!-- INCOMING LOADS -->

        <div class="chart-card">

            <h3 class="mb-4">

                <i class="fas fa-chart-pie"></i>
                Входящи товари

            </h3>

            <div class="chart-wrapper">

                <canvas id="incomingChart"></canvas>

            </div>

        </div>

    </div>

    <script th:inline="javascript">

        // LOAD STATUS

        let pending =
            /*[[${pendingLoads}]]*/ 0;

        let loading =
            /*[[${loadingLoads}]]*/ 0;

        let delivered =
            /*[[${deliveredLoads}]]*/ 0;

        const statusCtx =
            document.getElementById(
                'statusChart'
            );

        new Chart(statusCtx, {

            type: 'bar',

            data: {

                labels: [

                    'Чакащи',

                    'Натоварени',

                    'Доставени'

                ],

                datasets: [{

                    label: 'Товари',

                    data: [

                        pending,

                        loading,

                        delivered

                    ],

                    borderWidth: 1

                }]
            },

            options: {

                responsive: true,

                maintainAspectRatio: false,

                scales: {

                    y: {

                        beginAtZero: true,

                        ticks: {

                            precision:0

                        }

                    }

                }

            }

        });

        // INCOMING LOADS

        let incomingLoads =
            /*[[${incomingLoadsCount}]]*/ 0;

        let totalLoads =
            /*[[${totalLoads}]]*/ 0;

        const incomingCtx =
            document.getElementById(
                'incomingChart'
            );

        new Chart(incomingCtx, {

            type: 'doughnut',

            data: {

                labels: [

                    'Входящи',

                    'Изходящи'

                ],

                datasets: [{

                    data: [

                        incomingLoads,

                        totalLoads

                    ]

                }]
            },

            options: {

                responsive: true,

                maintainAspectRatio: false

            }

        });

    </script>

</div>

</body>

</html>
