<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head>
    <title>Добави Товар</title>
    <style>
        .form-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-card h1 {
            color: #0f4c75;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #0f4c75;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-control, .form-select {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: white;
            border-color: #0f4c75;
            box-shadow: 0 0 0 3px rgba(15, 76, 117, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e9ecef;
        }

        .form-actions .btn {
            flex: 1;
            padding: 12px;
            font-size: 15px;
        }

        .required-note {
            color: #e74c3c;
            margin-left: 5px;
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-hint {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-card">
            <h1><i class="fas fa-plus-circle"></i> Добави Нов Товар</h1>

            <form th:action="@{/loads/save}"
                  method="post"
                  enctype="multipart/form-data"
                  th:object="${loadRecord}">

                <div class="form-group">
                    <label for="productName">
                        <i class="fas fa-box"></i>
                        Продукт
                        <span class="required-note">*</span>
                    </label>
                    <input type="text"
                           id="productName"
                           th:field="*{productName}"
                           class="form-control"
                           placeholder="Например: Стройматериали"
                           required>
                </div>

                <div class="form-group">
                    <label for="quantity">
                        <i class="fas fa-cubes"></i>
                        Количество
                        <span class="required-note">*</span>
                    </label>
                    <input type="number"
                           id="quantity"
                           th:field="*{quantity}"
                           class="form-control"
                           placeholder="Количество"
                           required>
                </div>

                <div class="form-group">
                    <label for="loadedBy">
                        <i class="fas fa-user-hard-hat"></i>
                        Зареден от
                    </label>
                    <input type="text"
                           id="loadedBy"
                           th:field="*{loadedBy}"
                           class="form-control"
                           placeholder="Име на складчика">
                </div>

                <div class="form-group">
                    <label for="transportedBy">
                        <i class="fas fa-id-card"></i>
                        Превозван от
                    </label>
                    <input type="text"
                           id="transportedBy"
                           th:field="*{transportedBy}"
                           class="form-control"
                           placeholder="Име на шофьра">
                </div>

                <div class="form-group">
                    <label for="truck">
                        <i class="fas fa-truck"></i>
                        Камион
                        <span class="required-note">*</span>
                    </label>
                    <select id="truck"
                            th:field="*{truck}"
                            class="form-select"
                            required>
                        <option value="">-- Избери Камион --</option>
                        <option th:each="truck : ${trucks}"
                                th:value="${truck.id}"
                                th:text="${truck.truckNumber + ' (' + truck.driverName + ')'}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="status">
                        <i class="fas fa-tag"></i>
                        Статус
                        <span class="required-note">*</span>
                    </label>
                    <select id="status"
                            th:field="*{status}"
                            class="form-select"
                            required>
                        <option value="">-- Избери Статус --</option>
                        <option th:each="status : ${statuses}"
                                th:value="${status}"
                                th:text="${status}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notes">
                        <i class="fas fa-sticky-note"></i>
                        Бележки
                    </label>
                    <textarea id="notes"
                              th:field="*{notes}"
                              class="form-control"
                              placeholder="Допълнителни бележки"
                              rows="4"
                              style="resize: vertical;"></textarea>
                </div>

                <div class="form-group">
                    <label for="image">
                        <i class="fas fa-image"></i>
                        Снимка
                    </label>
                    <div class="file-input-wrapper">
                        <input type="file"
                               id="image"
                               name="image"
                               class="form-control"
                               accept="image/*">
                        <div class="file-input-hint">
                            <i class="fas fa-info-circle"></i> Максимум: 10MB (JPG, PNG, GIF)
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i> Запази Товар
                    </button>
                    <a href="/loads" class="btn btn-secondary">
                        <i class="fas fa-times-circle"></i> Отмени
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
