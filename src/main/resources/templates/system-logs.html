<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>

    <title>Системни Логове</title>

    <style>

        .logs-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            gap:15px;
            flex-wrap:wrap;
        }

        .log-card{
            background:white;
            border-radius:12px;
            padding:20px;
            margin-bottom:15px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
            border-left:5px solid #0f4c75;
        }

        .log-top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:15px;
            flex-wrap:wrap;
            gap:10px;
        }

        .log-user{
            font-size:18px;
            font-weight:bold;
            color:#0f4c75;
        }

        .log-action{
            background:#0f4c75;
            color:white;
            padding:5px 12px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
        }

        .log-details{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:15px;
        }

        .log-field{
            display:flex;
            flex-direction:column;
        }

        .log-label{
            font-size:12px;
            color:#888;
            margin-bottom:5px;
            font-weight:bold;
        }

        .log-value{
            font-size:15px;
            color:#2c3e50;
            font-weight:600;
            word-break:break-word;
        }

        .empty-box{
            background:white;
            border-radius:12px;
            padding:40px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }

        .pagination-container{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:15px;
            margin-top:30px;
            flex-wrap:wrap;
        }

        @media(max-width:768px){

            .logs-header{
                flex-direction:column;
                align-items:flex-start;
                gap:15px;
            }

            .log-top{
                flex-direction:column;
                align-items:flex-start;
            }

        }

    </style>

</head>

<body>

<div layout:fragment="content">

    <div class="logs-header">

        <div>

            <h1>

                <i class="fas fa-clipboard-list"></i>

                Системни Логове

            </h1>

            <p class="text-muted">

                История на действията в системата

            </p>

        </div>

        <div class="d-flex gap-2">

            <a href="/admin/logs/export"
               class="btn btn-success">

                <i class="fas fa-file-excel"></i>
                Export Excel

            </a>

        </div>

    </div>

    <!-- EMPTY -->

    <div th:if="${logs.empty}"
         class="empty-box">

        <h4>

            Няма записани логове

        </h4>

    </div>

    <!-- LOGS -->

    <div th:each="log : ${logs.content}"
         class="log-card">

        <div class="log-top">

            <div class="log-user"
                 th:text="${log.username}">
            </div>

            <div class="log-action"
                 th:text="${log.action}">
            </div>

        </div>

        <div class="log-details">

            <div class="log-field">

                <span class="log-label">

                    Описание

                </span>

                <span class="log-value"
                      th:text="${log.details}">
                </span>

            </div>

            <div class="log-field">

                <span class="log-label">

                    IP Адрес

                </span>

                <span class="log-value"
                      th:text="${log.ipAddress}">
                </span>

            </div>

            <div class="log-field">

                <span class="log-label">

                    Дата и Час

                </span>

                <span class="log-value"
                      th:text="${#temporals.format(log.createdAt, 'dd.MM.yyyy HH:mm:ss')}">
                </span>

            </div>

        </div>

    </div>

    <!-- PAGINATION -->

    <div class="pagination-container"
         th:if="${totalPages > 1}">

        <a class="btn btn-outline-primary"

           th:if="${currentPage > 0}"

           th:href="@{/admin/logs(page=${currentPage - 1})}">

            <i class="fas fa-arrow-left"></i>
            Previous

        </a>

        <span class="fw-bold">

            Страница
            <span th:text="${currentPage + 1}"></span>
            от
            <span th:text="${totalPages}"></span>

        </span>

        <a class="btn btn-outline-primary"

           th:if="${currentPage + 1 < totalPages}"

           th:href="@{/admin/logs(page=${currentPage + 1})}">

            Next
            <i class="fas fa-arrow-right"></i>

        </a>

    </div>

</div>

</body>

</html>
