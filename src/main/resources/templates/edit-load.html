<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>

    <title>Редактирай Товар</title>

    <style>

        .form-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 700px;
            margin: 0 auto;
        }

        .form-card h1 {
            color: #0f4c75;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .preview-image {
            max-width: 250px;
            border-radius: 10px;
            margin-top: 15px;
            border:1px solid #ddd;
        }

        .error-text {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }

        .is-invalid {
            border: 1px solid #dc3545 !important;
        }

        @media(max-width:768px){

            .form-card{
                padding:20px;
            }

            .form-actions{
                flex-direction:column;
            }

            .preview-image{
                max-width:100%;
            }

        }

    </style>

</head>

<body>

<div layout:fragment="content">

    <div class="form-card">

        <h1>
            <i class="fas fa-edit"></i>
            Редактирай Товар
        </h1>

        <form th:action="@{/loads/update}"
              method="post"
              enctype="multipart/form-data"
              th:object="${loadRecord}">

            <input type="hidden"
                   th:field="*{id}">

            <!-- PRODUCT -->

            <div class="form-group">

                <label class="form-label">
                    Продукт
                </label>

                <input type="text"

                       th:field="*{productName}"

                       class="form-control"

                       th:classappend="${#fields.hasErrors('productName')} ? 'is-invalid'"

                       maxlength="100"

                       required>

                <div class="error-text"
                     th:if="${#fields.hasErrors('productName')}"
                     th:errors="*{productName}">
                </div>

            </div>

            <!-- QUANTITY -->

            <div class="form-group">

                <label class="form-label">
                    Количество
                </label>

                <input type="number"

                       th:field="*{quantity}"

                       class="form-control"

                       th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"

                       min="1"

                       max="1000000"

                       required>

                <div class="error-text"
                     th:if="${#fields.hasErrors('quantity')}"
                     th:errors="*{quantity}">
                </div>

            </div>

            <!-- LOADED BY -->

            <div class="form-group">

                <label class="form-label">
                    Натоварил
                </label>

                <input type="text"

                       th:field="*{loadedBy}"

                       class="form-control"

                       th:classappend="${#fields.hasErrors('loadedBy')} ? 'is-invalid'"

                       maxlength="100"

                       required>

                <div class="error-text"
                     th:if="${#fields.hasErrors('loadedBy')}"
                     th:errors="*{loadedBy}">
                </div>

            </div>

            <!-- TRANSPORTED BY -->

            <div class="form-group">

                <label class="form-label">
                    Превозван от
                </label>

                <input type="text"

                       th:field="*{transportedBy}"

                       class="form-control"

                       th:classappend="${#fields.hasErrors('transportedBy')} ? 'is-invalid'"

                       maxlength="100"

                       required>

                <div class="error-text"
                     th:if="${#fields.hasErrors('transportedBy')}"
                     th:errors="*{transportedBy}">
                </div>

            </div>

            <!-- TRUCK -->

            <div class="form-group">

                <label class="form-label">
                    Камион
                </label>

                <select th:field="*{truck}"

                        class="form-select"

                        th:classappend="${#fields.hasErrors('truck')} ? 'is-invalid'"

                        required>

                    <option value="">
                        -- Избери Камион --
                    </option>

                    <option th:each="truck : ${trucks}"
                            th:value="${truck.id}"
                            th:text="${truck.truckNumber}">
                    </option>

                </select>

                <div class="error-text"
                     th:if="${#fields.hasErrors('truck')}"
                     th:errors="*{truck}">
                </div>

            </div>

            <!-- STATUS -->

            <div class="form-group">

                <label class="form-label">
                    Статус
                </label>

                <select th:field="*{status}"

                        class="form-select"

                        th:classappend="${#fields.hasErrors('status')} ? 'is-invalid'"

                        required>

                    <option value="">
                        -- Избери Статус --
                    </option>

                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status.displayName}">
                    </option>

                </select>

                <div class="error-text"
                     th:if="${#fields.hasErrors('status')}"
                     th:errors="*{status}">
                </div>

            </div>

            <!-- NOTES -->

            <div class="form-group">

                <label class="form-label">
                    Бележки
                </label>

                <textarea th:field="*{notes}"

                          class="form-control"

                          maxlength="2000"

                          rows="4"></textarea>

                <small class="text-muted">

                    Максимум 2000 символа

                </small>

            </div>

            <!-- IMAGE -->

            <div class="form-group">

                <label class="form-label">
                    Снимка
                </label>

                <input type="file"
                       name="image"
                       class="form-control"
                       accept="image/*">

                <small class="text-muted">

                    JPG, PNG, WEBP
                    | Максимум 10MB

                </small>

                <img th:if="${loadRecord.imagePath != null}"
                     th:src="@{'/uploads/' + ${loadRecord.imagePath}}"
                     class="preview-image">

            </div>

            <!-- DOCUMENT -->

            <div class="form-group">

                <label class="form-label">
                    Складова Бележка
                </label>

                <input type="file"
                       name="document"
                       class="form-control"
                       accept=".pdf,.doc,.docx">

                <small class="text-muted">

                    PDF, DOC, DOCX
                    | Максимум 10MB

                </small>

                <div class="mt-3"
                     th:if="${loadRecord.documentPath != null}">

                    <a th:href="@{'/uploads/documents/' + ${loadRecord.documentPath}}"
                       target="_blank"
                       class="btn btn-primary">

                        <i class="fas fa-file-pdf"></i>
                        Виж Бележката

                    </a>

                </div>

            </div>

            <!-- ACTIONS -->

            <div class="form-actions">

                <button type="submit"
                        class="btn btn-success"
                        onclick="this.disabled=true;this.form.submit();">

                    <i class="fas fa-save"></i>
                    Обнови

                </button>

                <a href="/loads"
                   class="btn btn-secondary">

                    Назад

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
